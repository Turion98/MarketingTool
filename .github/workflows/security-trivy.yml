name: security-trivy
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Ha van Dockerfile, image scan
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (if Dockerfile exists)
        run: |
          if [ -f Dockerfile ]; then
            docker build -t app:ci .
          else
            echo "No Dockerfile, will run FS scan only."
          fi

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.3

      - name: Trivy Image Scan (if image built)
        if: ${{ hashFiles('Dockerfile') != '' }}
        run: |
          trivy image --exit-code 1 --severity CRITICAL,HIGH --format sarif --output trivy.sarif app:ci || true

      - name: Trivy FS Scan (repo)
        run: |
          trivy fs --exit-code 1 --severity CRITICAL,HIGH --format sarif --output trivy-fs.sarif .

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
        if: ${{ hashFiles('Dockerfile') != '' }}

      - name: Upload FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
