name: Deploy backend

on:
  push:
    branches: ["main"]
workflow_dispatch:
concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: 🔍 Sanity check SSH_KEY
        shell: bash
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          set -e
          if [ -z "$SSH_KEY" ]; then
            echo "❌ SSH_KEY secret is EMPTY"
            exit 1
          fi

          FIRST_LINE=$(echo "$SSH_KEY" | head -n 1)

          if echo "$FIRST_LINE" | grep -q "BEGIN .*PRIVATE KEY"; then
            echo "✅ SSH_KEY looks like a PRIVATE KEY"
          else
            echo "❌ SSH_KEY does NOT look like a private key"
            echo "First line format mismatch"
            exit 1
          fi

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            ~/deploy-backend.sh
