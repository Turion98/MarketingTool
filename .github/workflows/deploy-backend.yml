name: Deploy backend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Sanity check SSH_KEY fingerprint
        shell: bash
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          set -e
          [ -n "$SSH_KEY" ] || (echo "SSH_KEY EMPTY" && exit 1)

          echo "$SSH_KEY" > key
          chmod 600 key

          echo "FIRST_LINE=$(head -n 1 key)"
          PUB=$(ssh-keygen -y -f key)
          echo "PUB=$PUB"
          echo "$PUB" | ssh-keygen -lf -

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            /root/deploy-backend.sh
